<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我的 - 了凡修行</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --xuan-paper: #F7F4EF; --xuan-warm: #EDE9E2; --xuan-dark: #E5E0D8;
  --ink: #1A1A1A; --ink-light: #4A4A48; --ink-muted: #8C8C88;
  --cinnabar: #B85450; --cinnabar-soft: #F0E0DE;
  --gold: #C9A96E; --gold-soft: #F5F0E3;
  --moss: #4A6741; --moss-soft: #E0E8DD;
}
body { font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; background: var(--xuan-paper); color: var(--ink); min-height: 100vh; padding-bottom: 100px; }

.user-card { margin: 20px; padding: 32px 28px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; }
.user-main { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
.avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(180deg,#2C2C2C 0%,#1A1A1A 100%); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 32px; font-weight: 700; border: 2px solid var(--gold); }
.user-info { flex: 1; }
.user-name { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.user-level { display: flex; align-items: center; gap: 12px; }
.level-badge { padding: 4px 12px; background: var(--cinnabar); color: white; font-size: 11px; font-weight: 600; border-radius: 10px; }
.level-progress { font-size: 12px; color: var(--ink-muted); }
.level-bar { padding-top: 16px; border-top: 1.5px solid var(--xuan-dark); }
.level-track { height: 6px; background: var(--xuan-dark); border-radius: 3px; overflow: hidden; margin-bottom: 12px; }
.level-fill { height: 100%; background: linear-gradient(90deg, var(--moss) 0%, var(--gold) 100%); border-radius: 3px; }
.level-text { font-size: 11px; color: var(--ink-muted); text-align: center; }

.stats-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 0 20px 24px; }
.stat-card { padding: 20px 8px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; text-align: center; }
.stat-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.stat-icon .dot { width: 12px; height: 12px; border-radius: 50%; }
.stat-card .num { font-size: 22px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
.stat-card .label { font-size: 11px; color: var(--ink-muted); }

.vip-banner { display: flex; align-items: center; justify-content: space-between; margin: 0 20px 24px; padding: 28px 24px; background: linear-gradient(135deg,#2C2C2C 0%,#1A1A1A 100%); border-radius: 12px; }
.vip-title { font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
.vip-desc { font-size: 12px; color: var(--ink-muted); }
.vip-btn { padding: 12px 24px; background: var(--gold); color: var(--ink); font-size: 13px; font-weight: 600; border-radius: 20px; text-decoration: none; }

.menu-list { margin: 0 20px; }
.menu-group { margin-bottom: 16px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; overflow: hidden; }
.menu-item { display: flex; align-items: center; padding: 24px; border-bottom: 1.5px solid var(--xuan-dark); text-decoration: none; color: inherit; }
.menu-item:last-child { border-bottom: none; }
.menu-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 16px; }
.menu-icon .dot { width: 12px; height: 12px; border-radius: 50%; }
.menu-text { flex: 1; }
.menu-title { display: block; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.menu-desc { display: block; font-size: 12px; color: var(--ink-muted); }
.menu-tag { padding: 4px 10px; background: var(--gold-soft); color: var(--gold); font-size: 10px; font-weight: 600; border-radius: 8px; margin-right: 12px; }
.menu-arrow { font-size: 14px; color: var(--ink-muted); }

.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(247,244,239,0.95); backdrop-filter: blur(10px); border-top: 1.5px solid var(--xuan-dark); display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 100; }
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 12px; color: var(--ink-muted); font-size: 11px; text-decoration: none; }
.tab-item.active { color: var(--cinnabar); }
.tab-icon { font-size: 22px; line-height: 1; }
</style>
</head>
