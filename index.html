<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>了凡修行</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --xuan-paper: #F7F4EF; --xuan-warm: #EDE9E2; --xuan-dark: #E5E0D8;
  --ink: #1A1A1A; --ink-light: #4A4A48; --ink-muted: #8C8C88;
  --cinnabar: #B85450; --cinnabar-soft: #F0E0DE;
  --gold: #C9A96E; --gold-soft: #F5F0E3;
  --moss: #4A6741; --moss-soft: #E0E8DD;
  --ink-wash: linear-gradient(180deg, #2C2C2C 0%, #1A1A1A 100%);
}
body {
  font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--xuan-paper); color: var(--ink); line-height: 1.6;
  min-height: 100vh; overflow-x: hidden; position: relative;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}
.header { position: relative; padding: 48px 24px 32px; text-align: center; z-index: 1; }
.brand { font-size: 32px; font-weight: 700; letter-spacing: 8px; display: inline-block; position: relative; }
.brand::after { content: '修行'; position: absolute; right: -40px; top: -8px; width: 36px; height: 36px; background: var(--cinnabar); color: white; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; border-radius: 4px; transform: rotate(-8deg); opacity: 0.9; }
.sub-brand { font-size: 13px; color: var(--ink-muted); letter-spacing: 4px; margin-bottom: 20px; }
.user-bar { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 16px; }
.avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--ink-wash); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 20px; border: 2px solid var(--gold); }
.user-info { text-align: left; }
.user-name { font-size: 16px; font-weight: 600; }
.user-level { font-size: 12px; color: var(--cinnabar); margin-top: 2px; display: flex; align-items: center; gap: 4px; }
.level-dot { width: 6px; height: 6px; background: var(--cinnabar); border-radius: 50%; }

.card { position: relative; margin: 0 20px 24px; padding: 28px 20px; background: linear-gradient(180deg, #FAF8F5 0%, #F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; z-index: 1; overflow: hidden; }
.tree-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.tree-title { font-size: 18px; font-weight: 700; }
.tree-title span { font-size: 12px; font-weight: 400; color: var(--ink-muted); margin-left: 8px; }
.tree-stats { text-align: right; }
.tree-score { font-size: 28px; font-weight: 700; color: var(--moss); line-height: 1; }
.tree-label { font-size: 11px; color: var(--ink-muted); margin-top: 4px; }
.tree-visual { position: relative; height: 200px; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 16px; }
.tree-trunk { width: 12px; height: 80px; background: linear-gradient(180deg, #6B5B4F 0%, #4A3F36 100%); border-radius: 6px; position: relative; }
.tree-crown { position: absolute; bottom: 60px; width: 140px; height: 140px; background: radial-gradient(circle at 40% 60%, rgba(74,103,65,0.25) 0%, rgba(74,103,65,0.08) 50%, transparent 70%); border-radius: 50%; }
.tree-crown::before, .tree-crown::after { content: ''; position: absolute; border-radius: 50%; background: radial-gradient(circle, rgba(74,103,65,0.2) 0%, transparent 70%); }
.tree-crown::before { width: 100px; height: 100px; top: -30px; left: -20px; }
.tree-crown::after { width: 80px; height: 80px; top: -10px; right: -30px; }
.leaf { position: absolute; font-size: 14px; opacity: 0; animation: leafFall 4s ease-in-out infinite; }
.leaf:nth-child(1) { left: 20%; animation-delay: 0s; }
.leaf:nth-child(2) { left: 50%; animation-delay: 1.3s; }
.leaf:nth-child(3) { left: 75%; animation-delay: 2.6s; }
@keyframes leafFall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 0; } 20% { opacity: 0.8; } 80% { opacity: 0.6; } 100% { transform: translateY(180px) rotate(360deg); opacity: 0; } }
.tree-merits { display: flex; gap: 12px; justify-content: center; }
.merit-pill { padding: 8px 16px; background: var(--xuan-paper); border: 1.5px solid var(--xuan-dark); border-radius: 20px; font-size: 13px; color: var(--ink-light); display: flex; align-items: center; gap: 6px; }
.merit-pill .dot { width: 8px; height: 8px; border-radius: 50%; }

.section { margin: 0 20px 24px; z-index: 1; position: relative; }
.section-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px; }
.section-title { font-size: 18px; font-weight: 700; }
.section-link { font-size: 13px; color: var(--cinnabar); text-decoration: none; }
.record-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.record-card { background: linear-gradient(135deg, #FAF8F5 0%, #F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; padding: 20px 16px; text-align: center; position: relative; overflow: hidden; transition: all 0.3s ease; cursor: pointer; }
.record-card:active { transform: scale(0.97); background: var(--xuan-warm); }
.record-icon { font-size: 32px; margin-bottom: 8px; }
.record-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.record-desc { font-size: 12px; color: var(--ink-muted); }
.record-score { position: absolute; top: 12px; right: 12px; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
.record-score.positive { background: var(--moss-soft); color: var(--moss); }
.record-score.negative { background: var(--cinnabar-soft); color: var(--cinnabar); }

.reflect-card { background: linear-gradient(135deg, #FAF8F5 0%, #F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; padding: 24px 20px; position: relative; }
.reflect-card::before { content: '三省吾身'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); writing-mode: vertical-rl; font-size: 14px; color: var(--xuan-dark); letter-spacing: 4px; font-weight: 600; opacity: 0.5; }
.reflect-question { font-size: 15px; color: var(--ink-light); margin-bottom: 12px; padding-right: 40px; }
.reflect-question strong { color: var(--cinnabar); font-weight: 600; }
.reflect-check { display: flex; gap: 12px; flex-wrap: wrap; }
.check-btn { padding: 8px 16px; border: 1.5px solid var(--xuan-dark); border-radius: 20px; font-size: 13px; color: var(--ink-light); background: transparent; transition: all 0.3s ease; cursor: pointer; }
.check-btn.active { background: var(--ink); color: white; border-color: var(--ink); }

.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(247,244,239,0.95); backdrop-filter: blur(10px); border-top: 1.5px solid var(--xuan-dark); display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 100; }
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 12px; color: var(--ink-muted); font-size: 11px; text-decoration: none; transition: all 0.3s ease; }
.tab-item.active { color: var(--cinnabar); }
.tab-icon { font-size: 22px; line-height: 1; }
.content-pad { height: 100px; }

.ink-reveal { opacity: 0; transform: translateY(20px); animation: inkReveal 0.8s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
.ink-reveal-1 { animation-delay: 0.1s; }
.ink-reveal-2 { animation-delay: 0.2s; }
.ink-reveal-3 { animation-delay: 0.3s; }
.ink-reveal-4 { animation-delay: 0.4s; }
@keyframes inkReveal { to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<header class="header ink-reveal ink-reveal-1">
  <div class="brand">了凡修行</div>
  <div class="sub-brand">命由我作 福自己求</div>
  <div class="user-bar">
    <div class="avatar">凡</div>
    <div class="user-info">
      <div class="user-name">修行者</div>
      <div class="user-level"><span class="level-dot"></span>初发心 · 第 3 日</div>
    </div>
  </div>
</header>

<section class="card ink-reveal ink-reveal-2">
  <div class="tree-header">
    <div class="tree-title">功德树 <span>随善行生长</span></div>
    <div class="tree-stats">
      <div class="tree-score">+128</div>
      <div class="tree-label">本月功德</div>
    </div>
  </div>
  <div class="tree-visual">
    <div class="leaf">🍃</div><div class="leaf">🍂</div><div class="leaf">🍃</div>
    <div class="tree-crown"></div><div class="tree-trunk"></div>
  </div>
  <div class="tree-merits">
    <div class="merit-pill"><span class="dot" style="background:var(--moss)"></span>善事 12 件</div>
    <div class="merit-pill"><span class="dot" style="background:var(--cinnabar)"></span>过失 3 件</div>
  </div>
</section>

<section class="section ink-reveal ink-reveal-3">
  <div class="section-header-row">
    <div class="section-title">今日功过</div>
    <a href="/liaofan-prototype/gongguo.html" class="section-link">查看全部 →</a>
  </div>
  <div class="record-grid">
    <div class="record-card"><div class="record-score positive">+10</div><div class="record-icon">🙏</div><div class="record-name">诵经礼忏</div><div class="record-desc">诵经一卷或礼忏百拜</div></div>
    <div class="record-card"><div class="record-score positive">+5</div><div class="record-icon">🤝</div><div class="record-name">与人为善</div><div class="record-desc">真心助人一次</div></div>
    <div class="record-card"><div class="record-score positive">+3</div><div class="record-icon">💰</div><div class="record-name">舍财作福</div><div class="record-desc">布施或捐赠</div></div>
    <div class="record-card"><div class="record-score negative">-3</div><div class="record-icon">😤</div><div class="record-name">嗔心起</div><div class="record-desc">发脾气或抱怨</div></div>
  </div>
</section>

<section class="section ink-reveal ink-reveal-4">
  <div class="section-header-row"><div class="section-title">今日三省</div></div>
  <div class="reflect-card">
    <div class="reflect-question">今日有<strong>改过</strong>吗？</div>
    <div class="reflect-check">
      <button class="check-btn">觉察过失</button>
      <button class="check-btn active">已作忏悔</button>
      <button class="check-btn">未犯过失</button>
    </div>
  </div>
</section>

<div class="content-pad"></div>

<nav class="tab-bar">
  <a href="/liaofan-prototype/index.html" class="tab-item active"><span class="tab-icon">◈</span><span>修行</span></a>
  <a href="/liaofan-prototype/gongguo.html" class="tab-item"><span class="tab-icon">✎</span><span>功过格</span></a>
  <a href="/liaofan-prototype/sixun.html" class="tab-item"><span class="tab-icon">📖</span><span>四训</span></a>
  <a href="/liaofan-prototype/profile.html" class="tab-item"><span class="tab-icon">◉</span><span>我的</span></a>
</nav>

<script>
document.querySelectorAll('.check-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    this.parentElement.querySelectorAll('.check-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});
</script>
</body>
</html>
