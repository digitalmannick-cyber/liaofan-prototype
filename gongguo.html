<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>功过格 - 了凡修行</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --xuan-paper: #F7F4EF; --xuan-warm: #EDE9E2; --xuan-dark: #E5E0D8;
  --ink: #1A1A1A; --ink-light: #4A4A48; --ink-muted: #8C8C88;
  --cinnabar: #B85450; --cinnabar-soft: #F0E0DE;
  --gold: #C9A96E; --gold-soft: #F5F0E3;
  --moss: #4A6741; --moss-soft: #E0E8DD;
}
body { font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; background: var(--xuan-paper); color: var(--ink); min-height: 100vh; padding-bottom: 100px; }

.stats-bar { display: flex; align-items: center; justify-content: space-around; padding: 32px 20px; margin: 20px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; }
.stat-item { text-align: center; flex: 1; }
.stat-value { font-size: 36px; font-weight: 700; line-height: 1.2; }
.stat-value.good { color: var(--moss); }
.stat-value.bad { color: var(--cinnabar); }
.stat-label { font-size: 12px; color: var(--ink-muted); margin-top: 8px; }
.stat-divider { width: 1.5px; height: 40px; background: var(--xuan-dark); }

.tab-bar-nav { display: flex; margin: 0 20px 20px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; overflow: hidden; }
.tab-item-nav { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 24px 0; font-size: 15px; color: var(--ink-muted); cursor: pointer; transition: all 0.3s; }
.tab-item-nav.active { background: var(--ink); color: var(--xuan-paper); font-weight: 600; }
.tab-dot { width: 8px; height: 8px; border-radius: 50%; }

.rule-list { margin: 0 20px; }
.rule-category { margin-bottom: 20px; }
.category-title { font-size: 13px; font-weight: 600; color: var(--ink-muted); padding: 16px 8px 12px; letter-spacing: 2px; }
.rule-items { display: flex; flex-direction: column; gap: 8px; }
.rule-item { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; cursor: pointer; transition: all 0.2s; }
.rule-item:active { transform: translateY(2px); opacity: 0.9; }
.rule-main { flex: 1; }
.rule-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.rule-desc { font-size: 12px; color: var(--ink-muted); }
.note-badge { display: inline-block; font-size: 10px; color: var(--cinnabar); background: var(--cinnabar-soft); padding: 2px 8px; border-radius: 8px; margin-left: 8px; font-weight: 600; }
.rule-note { font-size: 11px; color: var(--cinnabar); margin-top: 8px; padding: 8px 12px; background: var(--cinnabar-soft); border-radius: 8px; line-height: 1.5; }
.rule-action { display: flex; align-items: center; gap: 16px; }
.rule-score { font-size: 18px; font-weight: 700; }
.rule-score.positive { color: var(--moss); }
.rule-score.negative { color: var(--cinnabar); }
.rule-count { min-width: 36px; height: 36px; background: var(--ink); color: white; font-size: 13px; font-weight: 600; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.add-btn { width: 36px; height: 36px; border: 2px solid var(--xuan-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
.add-btn::before { content: ''; width: 14px; height: 2px; background: var(--ink-muted); position: absolute; }
.add-btn::after { content: ''; width: 2px; height: 14px; background: var(--ink-muted); position: absolute; }

.section { margin: 24px 20px 0; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px; }
.section-title { font-size: 18px; font-weight: 700; }
.section-link { font-size: 13px; color: var(--cinnabar); cursor: pointer; }
.today-list { background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; padding: 8px 24px; }
.today-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1.5px solid var(--xuan-dark); }
.today-item:last-child { border-bottom: none; }
.today-name { font-size: 14px; }
.today-score { font-size: 15px; font-weight: 600; }
.today-score.positive { color: var(--moss); }
.today-score.negative { color: var(--cinnabar); }
.bottom-tip { text-align: center; padding: 32px 20px; font-size: 12px; color: var(--ink-muted); letter-spacing: 2px; }

.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(247,244,239,0.95); backdrop-filter: blur(10px); border-top: 1.5px solid var(--xuan-dark); display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 100; }
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 12px; color: var(--ink-muted); font-size: 11px; text-decoration: none; }
.tab-item.active { color: var(--cinnabar); }
.tab-icon { font-size: 22px; line-height: 1; }
</style>
</head>
<body>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-value good" id="todayGood">+0</div><div class="stat-label">今日功</div></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><div class="stat-value bad" id="todayBad">0</div><div class="stat-label">今日过</div></div>
  <div class="stat-divider"></div>
  <div class="stat-item"><div class="stat-value" id="netScore" style="color:var(--moss)">+0</div><div class="stat-label">净积分</div></div>
</div>

<div class="tab-bar-nav">
  <div class="tab-item-nav active" onclick="switchTab('good')"><span class="tab-dot" style="background:var(--moss)"></span><span>积善之家</span></div>
  <div class="tab-item-nav" onclick="switchTab('bad')"><span class="tab-dot" style="background:var(--cinnabar)"></span><span>改过之法</span></div>
</div>

<div class="rule-list" id="goodList"></div>
<div class="rule-list" id="badList" style="display:none"></div>

<div class="section" id="todaySection" style="display:none">
  <div class="section-header"><div class="section-title">今日记录</div><div class="section-link" onclick="clearToday()">清空</div></div>
  <div class="today-list" id="todayList"></div>
</div>

<div class="bottom-tip">《了凡四训》云：务要日日知非，日日改过</div>

<nav class="tab-bar">
  <a href="/liaofan-prototype/index.html" class="tab-item"><span class="tab-icon">◈</span><span>修行</span></a>
  <a href="/liaofan-prototype/gongguo.html" class="tab-item active"><span class="tab-icon">✎</span><span>功过格</span></a>
  <a href="/liaofan-prototype/sixun.html" class="tab-item"><span class="tab-icon">📖</span><span>四训</span></a>
  <a href="/liaofan-prototype/profile.html" class="tab-item"><span class="tab-icon">◉</span><span>我的</span></a>
</nav>

<script>
const goodRules = [
  { category: '孝顺悌道', rules: [
    { id: 'g1', name: '奉养父母', desc: '尽心照料父母起居饮食', score: 10 },
    { id: 'g2', name: '恭敬尊长', desc: '对长辈谦恭有礼', score: 5 },
    { id: 'g3', name: '友爱兄弟', desc: '兄弟姐妹和睦相处', score: 5 }
  ]},
  { category: '仁爱济世', rules: [
    { id: 'g4', name: '救人危急', desc: '遇人危难施以援手', score: 50 },
    { id: 'g5', name: '舍财作福', desc: '布施钱财助人', score: 10 },
    { id: 'g6', name: '护持正法', desc: '弘扬善法正道', score: 30 },
    { id: 'g7', name: '与人为善', desc: '真心助人向善', score: 5 }
  ]},
  { category: '修身律己', rules: [
    { id: 'g8', name: '诵经礼忏', desc: '诵经一卷或礼忏百拜', score: 3 },
    { id: 'g9', name: '静坐修身', desc: '每日静坐反省半小时', score: 3 },
    { id: 'g10', name: '忍辱不嗔', desc: '遇逆缘不起嗔心', score: 5 },
    { id: 'g11', name: '断恶修善', desc: '主动改正一处过失', score: 5 }
  ]},
  { category: '利物惜福', rules: [
    { id: 'g12', name: '爱惜物命', desc: '放生或不杀生', score: 5 },
    { id: 'g13', name: '劝人向善', desc: '劝诫他人改过迁善', score: 10 },
    { id: 'g14', name: '成人之美', desc: '成就他人的善事', score: 5 }
  ]}
];

const badRules = [
  { category: '悖逆忤道', rules: [
    { id: 'b1', name: '不孝父母', desc: '对父母言语冲撞或不敬', score: -10 },
    { id: 'b2', name: '不敬尊长', desc: '对长辈无礼傲慢', score: -5 },
    { id: 'b3', name: '兄弟不睦', desc: '与兄弟姐妹争执', score: -5 }
  ]},
  { category: '贪嗔嫉妒', rules: [
    { id: 'b4', name: '嗔心起', desc: '发脾气或抱怨他人', score: -3 },
    { id: 'b5', name: '嫉妒障碍', desc: '嫉妒他人成就', score: -5 },
    { id: 'b6', name: '贪婪吝啬', desc: '贪图不义之财', score: -10 },
    { id: 'b7', name: '妄语恶口', desc: '说谎或口出恶言', score: -5 }
  ]},
  { category: '杀盗淫妄', rules: [
    { id: 'b8', name: '杀生害命', desc: '故意伤害众生', score: -20 },
    { id: 'b9', name: '偷盗侵占', desc: '取非分之财', score: -20 },
    { id: 'b10', name: '邪淫不净', desc: '行为不端', score: -20 },
    { id: 'b11', name: '饮酒乱性', desc: '饮酒误事', score: -5 }
  ]},
  { category: '懈怠放逸', rules: [
    { id: 'b12', name: '荒废功课', desc: '该修行时偷懒', score: -3 },
    { id: 'b13', name: '见善不为', desc: '明知当行却不行', score: -5 },
    { id: 'b14', name: '闻过不改', desc: '知错不改', score: -10 }
  ]}
];

let counts = {};
let todayList = [];

function render() {
  const goodEl = document.getElementById('goodList');
  const badEl = document.getElementById('badList');

  goodEl.innerHTML = goodRules.map(cat => `
    <div class="rule-category">
      <div class="category-title">${cat.category}</div>
      <div class="rule-items">
        ${cat.rules.map(r => {
          const c = counts[r.id] || 0;
          return `<div class="rule-item" onclick="addRecord('${r.id}', '${r.name}', ${r.score})">
            <div class="rule-main"><div class="rule-name">${r.name}</div><div class="rule-desc">${r.desc}</div></div>
            <div class="rule-action">
              <div class="rule-score positive">+${r.score}</div>
              ${c > 0 ? `<div class="rule-count">${c}</div>` : '<div class="add-btn"></div>'}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  badEl.innerHTML = badRules.map(cat => `
    <div class="rule-category">
      <div class="category-title">${cat.category}</div>
      <div class="rule-items">
        ${cat.rules.map(r => {
          const c = counts[r.id] || 0;
          return `<div class="rule-item" onclick="addRecord('${r.id}', '${r.name}', ${r.score})">
            <div class="rule-main"><div class="rule-name">${r.name}</div><div class="rule-desc">${r.desc}</div></div>
            <div class="rule-action">
              <div class="rule-score negative">${r.score}</div>
              ${c > 0 ? `<div class="rule-count">${c}</div>` : '<div class="add-btn"></div>'}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');

  updateStats();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-item-nav').forEach((el, i) => el.classList.toggle('active', i === (tab === 'good' ? 0 : 1)));
  document.getElementById('goodList').style.display = tab === 'good' ? 'block' : 'none';
  document.getElementById('badList').style.display = tab === 'bad' ? 'block' : 'none';
}

function addRecord(id, name, score) {
  counts[id] = (counts[id] || 0) + 1;
  const existing = todayList.find(t => t.name === name);
  if (existing) existing.score += score; else todayList.push({ name, score });
  todayList.sort((a, b) => b.score - a.score);
  render();
}

function updateStats() {
  const good = Object.entries(counts).filter(([k]) => k.startsWith('g')).reduce((s, [, v]) => s + v, 0);
  const bad = Object.entries(counts).filter(([k]) => k.startsWith('b')).reduce((s, [, v]) => s + v, 0);
  const net = todayList.reduce((s, t) => s + t.score, 0);
  document.getElementById('todayGood').textContent = '+' + good;
  document.getElementById('todayBad').textContent = bad;
  document.getElementById('netScore').textContent = (net >= 0 ? '+' : '') + net;
  document.getElementById('netScore').style.color = net >= 0 ? 'var(--moss)' : 'var(--cinnabar)';

  const listEl = document.getElementById('todayList');
  const secEl = document.getElementById('todaySection');
  if (todayList.length > 0) {
    secEl.style.display = 'block';
    listEl.innerHTML = todayList.map(t => `
      <div class="today-item">
        <div class="today-name">${t.name}</div>
        <div class="today-score ${t.score > 0 ? 'positive' : 'negative'}">${t.score > 0 ? '+' : ''}${t.score}</div>
      </div>
    `).join('');
  } else {
    secEl.style.display = 'none';
  }
}

function clearToday() {
  if (!confirm('确认清空今日所有记录？')) return;
  counts = {}; todayList = []; render();
}

render();
</script>
</body>
</html>
