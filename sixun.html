<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>了凡四训 - 了凡修行</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --xuan-paper: #F7F4EF; --xuan-warm: #EDE9E2; --xuan-dark: #E5E0D8;
  --ink: #1A1A1A; --ink-light: #4A4A48; --ink-muted: #8C8C88;
  --cinnabar: #B85450; --cinnabar-soft: #F0E0DE;
  --gold: #C9A96E; --gold-soft: #F5F0E3;
  --moss: #4A6741; --moss-soft: #E0E8DD;
}
body { font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; background: var(--xuan-paper); color: var(--ink); min-height: 100vh; padding-bottom: 100px; }

.chapter-nav { display: flex; padding: 20px; gap: 12px; overflow-x: auto; }
.chapter-tab { flex: 1; min-width: 140px; padding: 20px 16px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.3s; }
.chapter-tab.active { background: var(--ink); border-color: var(--ink); }
.chapter-num { font-size: 28px; font-weight: 700; color: var(--ink-muted); margin-bottom: 8px; }
.chapter-tab.active .chapter-num { color: var(--gold); }
.chapter-name { font-size: 13px; color: var(--ink-light); font-weight: 600; }
.chapter-tab.active .chapter-name { color: var(--xuan-paper); }

.chapter-content { margin: 0 20px; padding: 32px 28px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; }
.content-header { text-align: center; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1.5px solid var(--xuan-dark); }
.content-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.content-subtitle { font-size: 13px; color: var(--ink-muted); }
.section-block { margin-bottom: 32px; }
.section-block:last-child { margin-bottom: 0; }
.section-label { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
.section-label text { font-size: 13px; font-weight: 600; color: var(--ink-muted); letter-spacing: 4px; }
.label-line { flex: 1; height: 1px; background: var(--xuan-dark); }
.original-text { font-size: 15px; line-height: 2; text-align: justify; padding: 20px; background: var(--xuan-warm); border-radius: 8px; border-left: 4px solid var(--cinnabar); }
.original-text p { margin-bottom: 12px; text-indent: 2em; }
.translated-text { font-size: 14px; line-height: 1.8; color: var(--ink-light); text-align: justify; padding: 20px; background: var(--xuan-warm); border-radius: 8px; border-left: 4px solid var(--moss); }
.translated-text p { margin-bottom: 12px; }
.key-points { display: flex; flex-direction: column; gap: 16px; }
.key-point { display: flex; align-items: flex-start; gap: 12px; padding: 16px 20px; background: var(--xuan-warm); border-radius: 8px; }
.point-dot { width: 8px; height: 8px; background: var(--cinnabar); border-radius: 50%; margin-top: 8px; flex-shrink: 0; }
.point-text { font-size: 14px; line-height: 1.6; color: var(--ink-light); }

.page-control { display: flex; align-items: center; justify-content: space-between; margin: 24px 20px 0; padding: 20px 24px; background: linear-gradient(135deg,#FAF8F5 0%,#F5F3EF 100%); border: 1.5px solid var(--xuan-dark); border-radius: 12px; }
.page-btn { padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--ink); background: var(--xuan-warm); border-radius: 8px; cursor: pointer; }
.page-btn.disabled { color: var(--ink-muted); background: var(--xuan-dark); pointer-events: none; }
.page-indicator { font-size: 13px; color: var(--ink-muted); }

.tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(247,244,239,0.95); backdrop-filter: blur(10px); border-top: 1.5px solid var(--xuan-dark); display: flex; justify-content: space-around; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)); z-index: 100; }
.tab-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 12px; color: var(--ink-muted); font-size: 11px; text-decoration: none; }
.tab-item.active { color: var(--cinnabar); }
.tab-icon { font-size: 22px; line-height: 1; }
</style>
</head>
<body>

<div class="chapter-nav">
  <div class="chapter-tab active" onclick="switchChapter(0)"><div class="chapter-num">第一训</div><div class="chapter-name">立命之学</div></div>
  <div class="chapter-tab" onclick="switchChapter(1)"><div class="chapter-num">第二训</div><div class="chapter-name">改过之法</div></div>
  <div class="chapter-tab" onclick="switchChapter(2)"><div class="chapter-num">第三训</div><div class="chapter-name">积善之方</div></div>
  <div class="chapter-tab" onclick="switchChapter(3)"><div class="chapter-num">第四训</div><div class="chapter-name">谦德之效</div></div>
</div>

<div class="chapter-content" id="content"></div>

<div class="page-control">
  <div class="page-btn" id="prevBtn" onclick="prevChapter()">← 上一章</div>
  <div class="page-indicator" id="indicator">1 / 4</div>
  <div class="page-btn" id="nextBtn" onclick="nextChapter()">下一章 →</div>
</div>

<nav class="tab-bar">
  <a href="/liaofan-prototype/index.html" class="tab-item"><span class="tab-icon">◈</span><span>修行</span></a>
  <a href="/liaofan-prototype/gongguo.html" class="tab-item"><span class="tab-icon">✎</span><span>功过格</span></a>
  <a href="sixun.html" class="tab-item active"><span class="tab-icon">📖</span><span>四训</span></a>
  <a href="/liaofan-prototype/profile.html" class="tab-item"><span class="tab-icon">◉</span><span>我的</span></a>
</nav>

<script>
const chapters = [
  {
    number: '第一训', title: '立命之学', subtitle: '命运由己，福自己求',
    original: ['余童年丧父，老母命弃举业学医，谓可以养生，可以济人，且习一艺以成名，尔父夙心也。','后余在慈云寺，遇一老者，修髯伟貌，飘飘若仙，余敬礼之。语余曰：「子仕路中人也，明年即进学，何不读书？」','余告以故，并叩老者姓氏里居。曰：「吾姓孔，云南人也。得邵子皇极数正传，数该传汝。」','余引之归，告母。母曰：「善待之。」试其数，纤悉皆验。余遂起读书之念，谋之表兄沈称，言：「郁海谷先生，在沈友夫家开馆，我送汝寄学甚便。」余遂礼郁为师。','孔为余起数：县考童生，当十四名；府考七十一名，提学考第九名。明年赴考，三处名数皆合。','复为卜终身休咎，言：某年考第几名，某年当补廪，某年当贡，贡后某年，当选四川一大尹，在任三年半，即宜告归。五十三岁八月十四日丑时，当终于正寝，惜无子。余备录而谨记之。'],
    translation: ['我小时候就失去了父亲，母亲让我放弃科举学业去学医，说学医可以养生，可以救济他人，而且学一门手艺可以成名，这也是你父亲的心愿。','后来我在慈云寺，遇到一位老者，须髯修长，相貌堂堂，飘飘然像神仙一样，我恭敬地向他行礼。他对我说：「你是做官的人，明年就能考中秀才，为什么不读书呢？」','我把原因告诉了他，并询问老者的姓名和住处。他说：「我姓孔，是云南人。得到了邵子皇极数的真传，命中注定应该传授给你。」','我把他带回家，告诉母亲。母亲说：「好好对待他。」试算他的预测，细微之处都应验了。我于是产生了读书的念头，和表兄沈称商量，他说：「郁海谷先生在沈友夫家开私塾，我送你去寄学很方便。」我于是拜郁先生为师。','孔先生为我推算：县考童生，应该是第十四名；府考第七十一名，提学考第九名。第二年去考试，三个地方的名次都符合。','又为我推算一生的吉凶祸福，说：某年考第几名，某年当补廪生，某年当贡生，贡生后某年，会选为四川的一个知县，在任三年半，就应该告老还乡。五十三岁八月十四日丑时，当在家中寿终正寝，可惜没有儿子。我详细地记录下来并牢记在心。'],
    keyPoints: ['命由我作，福自己求——命运不是注定的，可以由自己创造','人的命运在于自己的所作所为，善恶报应如影随形','了凡先生最初信命，后被云谷禅师点化，明白改变命运的关键在于自己的心念和行为']
  },
  {
    number: '第二训', title: '改过之法', subtitle: '知错能改，善莫大焉',
    original: ['春秋诸大夫，见人言动，亿而谈其祸福，靡不验者，左国诸记可观也。','大都吉凶之兆，萌乎心而动乎四体，其过于厚者常获福，过于薄者常近祸，俗眼识之，君子未必得也。','至谓「未论行善，先须改过」，何谓也？','夫过者，自大贤所不免，然不害其卒为大贤者，为其能改也。故不贵于无过，而贵于能改过。','各人过恶不同，或起于色，或起于口，或起于身，或起于心，种种不一，然皆可以改也。'],
    translation: ['春秋时期各国大夫，见到人的言语行动，就能推测他的祸福，没有不应验的，左传国语等书中都有记载可以参看。','大体上吉凶的征兆，萌生于内心而表现于四肢，心地厚道的人常常获得福报，心地刻薄的人常常接近灾祸，普通人能够看出来，有学问的人未必能看得出来。','至于说「未论行善，先须改过」，是什么意思呢？','过失，即使是大贤人也难免会有，然而不害他最终成为大贤人，是因为他能改过。所以可贵的不在于没有过错，而在于能够改过。','每个人的过失罪恶不同，有的起于色欲，有的起于言语，有的起于身体行为，有的起于内心念头，种种不一，但都是可以改过的。'],
    keyPoints: ['改过的三个层次：事上改、理上改、心上改','从事上改是强压，从理上改是明悟，从心上改是究竟','改过需要具备羞耻心、敬畏心和勇猛心','最上等的改过是从心念上改，一念清净，万罪消灭']
  },
  {
    number: '第三训', title: '积善之方', subtitle: '积善成德，厚德载物',
    original: ['《易》曰：「积善之家，必有余庆。」昔颜氏将以女妻叔梁纥，而历叙其祖宗积德之长，逆知其子孙必有兴者。','孔子称舜之大孝，曰：「宗庙飨之，子孙保之。」皆至论也。试以往事征之。','杨少师荣，建宁人。世以济渡为生，久雨溪涨，横流冲毁民居，溺死者顺流而下，他舟皆往捞取货物，独少师曾祖及祖，惟以舟济人，而一无所利，乡人共嗤其愚。','逮少师父生，家渐裕，忽有神仙化为道者，告之曰：「汝祖父有阴功，子孙当贵显，宜葬某地。」遂依其所指而窆之，即今白兔坟也。','后生少师，弱冠登第，位至三公，加曾祖、祖、父，如其官。子孙贵盛，至今尚多贤者。'],
    translation: ['《易经》说：「积善的人家，必定有多余的吉庆。」从前颜氏要把女儿嫁给叔梁纥，就一一叙述他祖宗积德的长处，预知他的子孙必定有兴旺的。','孔子称赞舜的大孝，说：「宗庙会祭祀他，子孙会保住他的福泽。」这些都是至理名言。试着用过去的事来验证。','杨少师荣，是建宁人。世代以摆渡为生，久雨溪水上涨，横流冲毁民居，溺水的人顺流而下，其他船都去捞取货物，只有少师的曾祖和祖父，只用船救人，而一无所取，乡里人都嘲笑他们愚笨。','到了少师的父亲出生，家境渐渐宽裕，忽然有神仙化作道士，告诉他说：「你的祖父有阴德，子孙应当显贵，应该葬在某地。」于是依照他所指的安葬，就是现在的白兔坟。','后来生了少师，二十岁考中进士，官至三公，追赠曾祖、祖父、父亲，都和他一样的官职。子孙显贵兴盛，到现在还有很多贤能的人。'],
    keyPoints: ['积善的十类标准：与人为善、爱敬存心、成人之美、劝人为善、救人危急、兴建大利、舍财作福、护持正法、敬重尊长、爱惜物命','行善要辨别善恶，不可好心做坏事','行善贵在真诚，不在大小','积善之家必有余庆，积德之人大富大贵']
  },
  {
    number: '第四训', title: '谦德之效', subtitle: '满招损，谦受益',
    original: ['《易》曰：「天道亏盈而益谦；地道变盈而流谦；鬼神害盈而福谦；人道恶盈而好谦。」是故谦之一卦，六爻皆吉。','《书》曰：「满招损，谦受益。」余屡同诸公应试，每见寒士将达，必有一段谦光可掬。','辛未计偕，我嘉善同袍凡十人，惟丁敬宇宾，年最少，极其谦虚。','予告费锦坡曰：「此兄今年必第。」费曰：「何以见之？」予曰：「惟谦受福。兄看十人中，有恂恂款款，不敢先人，如敬宇者乎？有恭敬顺承，小心谦畏，如敬宇者乎？有受侮不答，闻谤不辩，如敬宇者乎？人能如此，即天地鬼神，犹将佑之，岂有不发者？」','及开榜，丁果中式。'],
    translation: ['《易经》说：「天道使盈满亏损，使谦虚增益；地道使盈满改变，使谦虚充实；鬼神使盈满受害，使谦虚得福；人道厌恶盈满，喜好谦虚。」所以谦这一卦，六爻都是吉利的。','《尚书》说：「自满招致损失，谦虚得到益处。」我多次和各位一起参加考试，每次见到贫寒的读书人将要发达时，必定有一段谦虚的光彩可以看出来。','辛未年进京考试，我们嘉善同去的有十个人，只有丁敬宇宾年纪最小，极其谦虚。','我告诉费锦坡说：「这位兄台今年必定考中。」费说：「凭什么看得出来？」我说：「只有谦虚才能得福。你看十个人中，有像他那样恭恭敬敬、不敢领先的吗？有像他那样恭敬顺承、小心谦畏的吗？有像他那样受侮辱不回应、听到诽谤不辩解的吗？人能做到这样，即使天地鬼神，也会保佑他，哪有不出人头地的？」','等到发榜，丁果然考中了。'],
    keyPoints: ['谦卦六爻皆吉，是《易经》中唯一全吉的卦','谦虚是修身的根本，是积福的最佳途径','谦虚者天地鬼神皆佑之','傲慢是招祸之根，谦虚是纳福之门']
  }
];

let current = 0;

function render() {
  const c = chapters[current];
  document.getElementById('content').innerHTML = `
    <div class="content-header"><div class="content-title">${c.title}</div><div class="content-subtitle">${c.subtitle}</div></div>
    <div class="section-block"><div class="section-label"><div class="label-line"></div><text>原文</text><div class="label-line"></div></div><div class="original-text">${c.original.map(p=>`<p>${p}</p>`).join('')}</div></div>
    <div class="section-block"><div class="section-label"><div class="label-line"></div><text>译文</text><div class="label-line"></div></div><div class="translated-text">${c.translation.map(p=>`<p>${p}</p>`).join('')}</div></div>
    <div class="section-block"><div class="section-label"><div class="label-line"></div><text>核心要义</text><div class="label-line"></div></div><div class="key-points">${c.keyPoints.map(p=>`<div class="key-point"><div class="point-dot"></div><div class="point-text">${p}</div></div>`).join('')}</div></div>`;
  document.querySelectorAll('.chapter-tab').forEach((el,i)=>el.classList.toggle('active', i===current));
  document.getElementById('indicator').textContent = `${current+1} / ${chapters.length}`;
  document.getElementById('prevBtn').classList.toggle('disabled', current===0);
  document.getElementById('nextBtn').classList.toggle('disabled', current===chapters.length-1);
}

function switchChapter(i) { current = i; render(); }
function prevChapter() { if (current>0) { current--; render(); } }
function nextChapter() { if (current<chapters.length-1) { current++; render(); } }
render();
</script>
</body>
</html>
